services:
  postgres:
    image: postgres:17
    container_name: task03-postgres
    environment:
      POSTGRES_DB: task03db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ── Application ──────────────────────────────────────────────
  # TODO: Uncomment this entire block (remove the leading "#" from every line)
  #       and replace the placeholder values with your personal info.
  #       See the Configuration section of the Task 3 spec for full instructions.
  #
  app:
     build: .
     # TODO: Replace XX-XXXXX with your student ID using a hyphen.
     # Example: 55-8078_container
     container_name: 55-18254_container
     ports:
       # TODO: Replace XXXXX with the second part of your student ID (the 5 digits after the underscore).
       # Example: "8078:8080"
       - "18254:8080"
     environment:
       # TODO: Replace with your full name, prefixed with Compose_. Format: Compose_FirstName_LastName
       # Example: Compose_Mohamed_Ayman
       USER_NAME: Compose_Seifeldin_Khaled
       # TODO: Replace with your student ID, prefixed with Compose_. Format: Compose_XX_XXXXX
       # Example: Compose_55_8078
       ID: Compose_55_18254
       SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/task03db
     depends_on:
       - postgres

volumes:
  pgdata:
